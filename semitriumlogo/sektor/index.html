<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семитриум — Результаты</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: #1f2937;
        }
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
            max-width: 720px;
            width: 100%;
        }
        h1 {
            text-align: center;
            margin: 0 0 8px;
            font-size: 24px;
            color: #1e1b4b;
        }
        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .star-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-width: 500px;
            margin: 0 auto 20px;
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px 16px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .legend-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .legend-name {
            font-weight: 600;
            color: #111827;
        }
        .legend-percent {
            font-size: 12px;
            color: #6b7280;
        }
        .trinity {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        .trinity-bar {
            height: 4px;
            border-radius: 2px;
            flex: 1;
            opacity: 0.85;
        }
        .trinity-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #9ca3af;
            margin-top: 2px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔺 Ваш Семитриум</h1>
    <p class="subtitle">7 ключевых сфер • баланс Дух–Душа–Тело</p>
    
    <div class="star-wrap">
        <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Градиенты для заполнения: от вершины (яркий) к основанию (бледный) -->
                <linearGradient id="grad1" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#ef4444" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="#ef4444" stop-opacity="0.25"/>
                </linearGradient>
                <linearGradient id="grad2" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#f97316" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="#f97316" stop-opacity="0.25"/>
                </linearGradient>
                <linearGradient id="grad3" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#eab308" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="#eab308" stop-opacity="0.25"/>
                </linearGradient>
                <linearGradient id="grad4" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#22c55e" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="#22c55e" stop-opacity="0.25"/>
                </linearGradient>
                <linearGradient id="grad5" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.25"/>
                </linearGradient>
                <linearGradient id="grad6" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.25"/>
                </linearGradient>
                <linearGradient id="grad7" x1="50%" y1="0%" x2="50%" y2="100%">
                    <stop offset="0%" stop-color="#ec4899" stop-opacity="0.95"/>
                    <stop offset="100%" stop-color="#ec4899" stop-opacity="0.25"/>
                </linearGradient>
                
                <!-- Клип-пути для заполнения от вершины -->
                <clipPath id="clip1"><polygon points=""/></clipPath>
            </defs>
            
            <!-- Группа с треугольниками -->
            <g id="triangles"></g>
        </svg>
    </div>
    
    <!-- Легенда с названиями и Тринити -->
    <div class="legend" id="legend"></div>
</div>

<script>
// Данные: 7 сфер с процентами и Тринити
const sectors = [
    { name: 'Здоровье', percent: 70, spirit: 90, soul: 70, body: 50, color: '#ef4444', grad: 'url(#grad1)' },
    { name: 'Карьера', percent: 85, spirit: 80, soul: 90, body: 85, color: '#f97316', grad: 'url(#grad2)' },
    { name: 'Отношения', percent: 60, spirit: 70, soul: 60, body: 50, color: '#eab308', grad: 'url(#grad3)' },
    { name: 'Финансы', percent: 45, spirit: 90, soul: 40, body: 30, color: '#22c55e', grad: 'url(#grad4)' },
    { name: 'Творчество', percent: 75, spirit: 80, soul: 90, body: 60, color: '#3b82f6', grad: 'url(#grad5)' },
    { name: 'Духовность', percent: 55, spirit: 60, soul: 70, body: 40, color: '#8b5cf6', grad: 'url(#grad6)' },
    { name: 'Нетворкинг', percent: 40, spirit: 50, soul: 40, body: 30, color: '#ec4899', grad: 'url(#grad7)' }
];

// Координаты 7 треугольников: вершина → два основания
// Все треугольники сходятся вершинами в центре (150,150)
const triangles = [
    // 0 - верх
    { apex: [150,150], base1: [130,40], base2: [170,40], labelAngle: -90 },
    // 1 - верх-право
    { apex: [150,150], base1: [220,70], base2: [245,110], labelAngle: -38 },
    // 2 - низ-право
    { apex: [150,150], base1: [245,190], base2: [220,230], labelAngle: 14 },
    // 3 - низ
    { apex: [150,150], base1: [170,260], base2: [130,260], labelAngle: 90 },
    // 4 - низ-лево
    { apex: [150,150], base1: [75,230], base2: [55,190], labelAngle: 166 },
    // 5 - верх-лево
    { apex: [150,150], base1: [55,110], base2: [80,70], labelAngle: 218 },
    // 6 - верх-лево (ближе к верху)
    { apex: [150,150], base1: [130,40], base2: [95,55], labelAngle: -142 }
];

function createFilledTriangle(apex, base1, base2, percent, gradient) {
    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    
    // Фоновый треугольник (бледный, весь)
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    bg.setAttribute('points', `${apex[0]},${apex[1]} ${base1[0]},${base1[1]} ${base2[0]},${base2[1]}`);
    bg.setAttribute('fill', '#e5e7eb');
    bg.setAttribute('fill-opacity', '0.35');
    bg.setAttribute('stroke', '#fff');
    bg.setAttribute('stroke-width', '1.2');
    group.appendChild(bg);
    
    // Заполнение: от вершины к основанию
    if (percent > 5) {
        const ratio = percent / 100;
        // Точки заполнения: вершина + две точки на сторонах
        const fillP1 = [apex[0] + (base1[0]-apex[0])*ratio, apex[1] + (base1[1]-apex[1])*ratio];
        const fillP2 = [apex[0] + (base2[0]-apex[0])*ratio, apex[1] + (base2[1]-apex[1])*ratio];
        
        const fill = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        fill.setAttribute('points', `${apex[0]},${apex[1]} ${fillP1[0]},${fillP1[1]} ${fillP2[0]},${fillP2[1]}`);
        fill.setAttribute('fill', gradient);
        fill.setAttribute('opacity', '0.9');
        group.appendChild(fill);
    }
    
    // Процент в центре заполнения
    if (percent > 15) {
        const ratio = percent / 100;
        const centerX = apex[0] + (base1[0]+base2[0])/2 - apex[0] * ratio * 0.6;
        const centerY = apex[1] + (base1[1]+base2[1])/2 - apex[1] * ratio * 0.6;
        
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', centerX);
        text.setAttribute('y', centerY + 4);
        text.setAttribute('font-size', '12');
        text.setAttribute('font-weight', '700');
        text.setAttribute('fill', '#fff');
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('style', 'text-shadow: 0 1px 3px rgba(0,0,0,0.4)');
        text.textContent = `${percent}%`;
        group.appendChild(text);
    }
    
    return group;
}

function render() {
    const container = document.getElementById('triangles');
    const legend = document.getElementById('legend');
    
    sectors.forEach((s, i) => {
        const t = triangles[i];
        // Рисуем треугольник
        const tri = createFilledTriangle(t.apex, t.base1, t.base2, s.percent, s.grad);
        container.appendChild(tri);
        
        // Добавляем в легенду
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
            <div class="legend-color" style="background: ${s.color}"></div>
            <div class="legend-text">
                <span class="legend-name">${s.name}</span>
                <span class="legend-percent">${s.percent}% заполнен</span>
                <div class="trinity">
                    <div class="trinity-bar" style="background: #3b82f6; width: ${s.spirit}%" title="Дух"></div>
                    <div class="trinity-bar" style="background: #ec4899; width: ${s.soul}%" title="Душа"></div>
                    <div class="trinity-bar" style="background: #ef4444; width: ${s.body}%" title="Тело"></div>
                </div>
                <div class="trinity-labels">
                    <span>🔵${s.spirit}</span>
                    <span>🟣${s.soul}</span>
                    <span>🔴${s.body}</span>
                </div>
            </div>
        `;
        legend.appendChild(item);
    });
}

render();
</script>
</body>
</html>
