<svg viewBox="0 0 300 300" width="180" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eddcb0"></stop>
      <stop offset="100%" stop-color="#9a7030"></stop>
    </linearGradient>
    <linearGradient id="tB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a96e"></stop>
      <stop offset="100%" stop-color="#7a5420"></stop>
    </linearGradient>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
