<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌿 Семетриум Любви</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
@import url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/400,500,600,700.css');
:root{--bg:#0a0a14;--bg2:#12121f;--bg3:#1a1a2e;--accent:#e94560;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;--blue:#60a5fa;--text:#f0f0f0;--text2:#8888a0;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--body-cl:#fb923c;--soul-cl:#60a5fa;--spirit-cl:#c084fc}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.screen{display:none;min-height:100vh;padding:16px;flex-direction:column}
.screen.active{display:flex}
#welcome{justify-content:center;align-items:center;text-align:center;padding:32px 20px;gap:20px}
.logo-svg{width:100px;height:100px;animation:pulse 3s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.w-title{font-size:26px;font-weight:700;background:linear-gradient(135deg,#e94560,#fbbf24,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.w-sub{color:var(--text2);font-size:15px;line-height:1.6;max-width:320px}
.info-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 20px;width:100%;max-width:340px;text-align:left}
.info-box h3{font-size:13px;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.info-row:last-child{border:none}
.info-row span:last-child{font-weight:600}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 28px;border:none;border-radius:14px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;transition:all .15s;min-height:52px;width:100%;max-width:340px;-webkit-appearance:none;appearance:none}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c23152);color:#fff}
.btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:12px 16px;font-size:13px;min-height:44px;max-width:none;width:auto;border-radius:12px}
#quiz{padding:12px;gap:12px}
.q-header{display:flex;justify-content:space-between;align-items:center}
.q-header .back{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:8px}
.q-header .count{font-size:14px;color:var(--text2);font-weight:500}
.pbar{width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--yellow));border-radius:3px;transition:width .3s}
.q-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:20px}
.q-tag{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:10px}
.q-level{font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:500}
.q-text{font-size:17px;font-weight:500;line-height:1.55}
.answers{display:flex;flex-direction:column;gap:8px}
.abtn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--card);border:2px solid var(--border);border-radius:14px;cursor:pointer;transition:all .15s;text-align:left;width:100%;font-family:inherit;color:var(--text);font-size:13.5px;line-height:1.5;-webkit-appearance:none;appearance:none}
.abtn:active{transform:scale(0.98)}
.abtn.sel{border-color:var(--accent);background:rgba(233,69,96,0.08)}
.abtn .lt{flex-shrink:0;width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:var(--bg3);color:var(--text2)}
.abtn.sel .lt{background:var(--accent);color:#fff}
.q-footer{display:flex;gap:10px;margin-top:auto;padding-top:12px}
.q-footer .btn{flex:1;max-width:none}
#results{padding:16px;padding-bottom:40px;gap:18px}
.r-head{text-align:center;margin-bottom:4px}
.r-head h2{font-size:22px;font-weight:700}
.r-head .rd{font-size:13px;color:var(--text2);margin-top:4px}

/* Semetrium result visualization */
.sem-wrap{text-align:center;margin:8px 0}
.sem-svg{width:280px;height:280px}
.sem-pct{text-align:center;margin-top:4px;font-size:14px;font-weight:600}

/* Level bars */
.level-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px}
.level-card h4{font-size:15px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.lv-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.lv-row:last-child{margin-bottom:0}
.lv-label{font-size:13px;font-weight:700;width:56px;text-align:right;flex-shrink:0}
.lv-bar-bg{flex:1;height:12px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative}
.lv-bar-fill{height:100%;border-radius:6px;transition:width .5s}
.lv-bar-zero{position:absolute;left:50%;width:2px;height:100%;background:rgba(255,255,255,0.2);border-radius:1px}
.lv-pct{font-size:13px;font-weight:600;width:42px;text-align:right;flex-shrink:0}

.sec{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;margin-top:4px}
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:14px}
.chart-box canvas{max-height:300px}
.dtable{width:100%;border-collapse:collapse;font-size:13px}
.dtable th{padding:8px 4px;border-bottom:2px solid var(--border);font-size:11px;color:var(--text2);text-align:left;font-weight:600}
.dtable td{padding:10px 4px;border-bottom:1px solid var(--border)}
.dtable tr:last-child td{border:none}
.indicator{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700}
.ind-on{background:rgba(74,222,128,0.2);color:#4ade80}
.ind-off{background:rgba(248,113,113,0.2);color:#f87171}
.ind-mid{background:rgba(160,160,176,0.15);color:#a0a0b0}

.ins-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px}
.ins-box h4{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ins-item{padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.6}
.ins-item:last-child{border:none}
.ins-item .il{font-weight:600;margin-bottom:4px;font-size:14px}
.ins-item .ix{color:var(--text2);font-size:13px;line-height:1.55}

.r-actions{display:flex;gap:8px;flex-wrap:wrap}
.r-actions .btn{flex:1;min-width:0}

#history{padding:16px;padding-bottom:40px;gap:16px}
#history h2{font-size:22px;font-weight:700}
.h-item{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.h-item .hd{font-size:13px;color:var(--text2)}
.h-item .hs{font-size:22px;font-weight:700}
.h-item .ha{display:flex;gap:6px}
.h-item .ha button{background:none;border:none;font-size:20px;cursor:pointer;padding:6px;opacity:.6}
.no-h{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
@media(min-width:600px){.screen{max-width:480px;margin:0 auto}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <div class="logo-svg" id="logoSvg"></div>
  <div class="w-title">Семетриум Любви</div>
  <div class="w-sub">Диагностическая карта вашего внутреннего сада</div>
  <div class="info-box">
    <h3>📋 О тесте</h3>
    <div class="info-row"><span>Вопросов</span><span>21</span></div>
    <div class="info-row"><span>Время</span><span>~5–7 мин</span></div>
    <div class="info-row"><span>Шкала</span><span>−100% … +100%</span></div>
    <div class="info-row"><span>Измерений</span><span>21 (7 начал × 3 уровня)</span></div>
  </div>
  <button class="btn btn-primary" onclick="startQuiz()">🌱 Начать тест</button>
  <button class="btn btn-secondary" onclick="showHistory()">📊 История</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="q-header">
    <button class="back" onclick="doExit()">✕</button>
    <span class="count" id="qCount">1 / 21</span>
  </div>
  <div class="pbar"><div class="pfill" id="pFill"></div></div>
  <div class="q-card">
    <div class="q-tag" id="qTag"></div>
    <div class="q-level" id="qLevel"></div>
    <div class="q-text" id="qText"></div>
  </div>
  <div class="answers" id="ansBox"></div>
  <div class="q-footer">
    <button class="btn btn-secondary" id="prevBtn" onclick="prevQ()">← Назад</button>
    <button class="btn btn-primary" id="nextBtn" onclick="nextQ()">Далее →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="r-head">
    <h2>🌿 Ваш Сад Любви</h2>
    <div class="rd" id="rDate"></div>
  </div>

  <!-- Semetrium SVG result -->
  <div class="sem-wrap" id="semWrap"></div>

  <!-- Level bars for each beginning -->
  <div class="sec">⚖️ Тело · Душа · Дух — по каждому началу</div>
  <div id="levelBarsContainer"></div>

  <!-- Summary table -->
  <div class="sec">📊 Сводка</div>
  <div class="chart-box" style="padding:10px;overflow-x:auto"><table class="dtable" id="dTable"></table></div>

  <!-- Insights -->
  <div class="sec">🔍 Аналитика и рекомендации</div>
  <div class="ins-box" id="insBox"></div>

  <div class="r-actions">
    <button class="btn btn-secondary btn-sm" onclick="exportPDF()">📄 PDF</button>
    <button class="btn btn-secondary btn-sm" onclick="showWelcome()">🏠 Домой</button>
    <button class="btn btn-primary btn-sm" onclick="startQuiz()">🔄 Заново</button>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h2>📊 История</h2>
    <button onclick="showWelcome()" style="background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:8px">✕</button>
  </div>
  <div id="hList"></div>
</div>

<script>
var BEGINNINGS = [
  {id:'eros',n:'ЭРОС',gr:'ἔρως',ic:'🔥',cl:'#e94560',

   desc_lo:'Ваш ЭРОС нуждается в развитии. Попробуйте практики работы с телесностью: танец, дыхательные упражнения, осознанное движение. Важно не подавлять влечение, а учиться его осознавать.',
   desc_mid:'ЭРОС проявляется, но ещё не раскрыт полностью. Обратите внимание на ситуации, где вы сдерживаете свою энергию — где можно быть смелее?'},

  {id:'storge',n:'СТОРГЕ',gr:'στοργή',ic:'🌱',cl:'#4ade80',

  {id:'agape',n:'АГАПЭ',gr:'ἀγάπη',ic:'☀️',cl:'#fbbf24',

  {id:'ludus',n:'ЛЮДУС',gr:'λῦδος',ic:'⛲',cl:'#c084fc',

   desc_lo:'ЛЮДУС подавлен. Жизнь стала слишком серьёзной. Разрешите себе 15 минут в день на «бесполезную» радость: танцуйте, рисуйте, смейтесь без причины.',

   desc_mid:'ПРАГМА развивается. У вас есть основа для надёжных отношений. Укрепите её через честные разговоры о будущем и совместные проекты.'},
  {id:'autarkia',n:'АВТАРКИЯ',gr:'αὐτάρκεια',ic:'🏡',cl:'#2dd4bf',

   desc_mid:'АВТАРКИЯ формируется. Вы на пути к самодостаточности. Укрепляйте её через честность с собой и уважение к своим потребностям.'}

var LEVELS = [
  {id:'body',n:'ТЕЛО',ic:'🔸',cl:'#fb923c',
   desc_hi:'Телесный уровень развит: вы чувствуете свои инстинкты, комфортно в физическом контакте, заботитесь о теле.',

function buildSemSvg(fillPercents, size) {
  // fillPercents: array of 7 values from -100 to +100
  // Triangles point INWARD: vertex at center, base at outer edge
  var cx = 150, cy = 150;
  var outerR = 120; // distance from center to base of triangle
  var baseHalfW = 28; // half-width of triangle base
  var svg = '<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" class="sem-svg">';
  svg += '<defs><filter id="sg"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';

  // Background faint triangles (all at 0%)
  for (var bg = 0; bg < 7; bg++) {
    var angle = bg * 360 / 7 - 90;
    svg += '<g transform="rotate(' + angle + ' ' + cx + ' ' + cy + '" opacity="0.06">';
    svg += '<polygon points="' + cx + ',' + cy + ' ' + (cx - baseHalfW) + ',' + (cy - outerR) + ' ' + (cx + baseHalfW) + ',' + (cy - outerR) + '" fill="#4ade80"/>';
    svg += '</g>';
  }

  // Filled triangles
  for (var ti = 0; ti < 7; ti++) {
    var fp = fillPercents[ti]; // -100 to +100
    var fillRatio = (fp + 100) / 200; // 0 to 1
    var b = BEGINNINGS[ti];

    // Triangle: vertex at center (cx,cy), base at (cx ± baseHalfW, cy - outerR)
    // Fill: from center outward by fillRatio
    var fillDist = fillRatio * outerR;
    var fillHalfW = fillRatio * baseHalfW;

    var triColor;
    if (fp > 60) triColor = '#4ade80';
    else if (fp < -60) triColor = '#f87171';
    else triColor = b.cl;

    var opacity = fp > 60 ? 0.85 : (fp < -60 ? 0.7 : 0.55);

    var angle2 = ti * 360 / 7 - 90;
    svg += '<g transform="rotate(' + angle2 + ' ' + cx + ' ' + cy + ')" filter="url(#sg)">';
    svg += '<polygon points="' + cx + ',' + cy + ' ' + (cx - fillHalfW).toFixed(1) + ',' + (cy - fillDist).toFixed(1) + ' ' + (cx + fillHalfW).toFixed(1) + ',' + (cy - fillDist).toFixed(1) + '" fill="' + triColor + '" opacity="' + opacity + '"/>';
    svg += '</g>';
  }

  // Center circle
  svg += '<circle cx="' + cx + '" cy="' + cy + '" r="28" fill="#0a0a14" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>';

  svg += '</svg>';
  return svg;
}

function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) { screens[i].classList.remove('active'); }
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showWelcome() { showScreen('welcome'); }
function showHistory() { showScreen('history'); renderHistoryList(); }

function startQuiz() {
  currentQ = 0;
  answers = new Array(21).fill(null);
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  var q = QS[currentQ];
  var bi = null, li = null;
  for (var i = 0; i < BEGINNINGS.length; i++) { if (BEGINNINGS[i].id === q.b) bi = BEGINNINGS[i]; }
  for (var j = 0; j < LEVELS.length; j++) { if (LEVELS[j].id === q.l) li = LEVELS[j]; }

  document.getElementById('qCount').textContent = (currentQ + 1) + ' / 21';
  document.getElementById('pFill').style.width = ((currentQ + 1) / 21 * 100) + '%';

  var tagEl = document.getElementById('qTag');
  tagEl.textContent = bi.ic + ' ' + bi.n + ' (' + bi.gr + ')';
  tagEl.style.background = bi.cl + '22';
  tagEl.style.color = bi.cl;

  document.getElementById('qLevel').innerHTML = '<span style="color:' + li.cl + ';font-weight:700">' + li.ic + ' ' + li.n + '</span>';
  document.getElementById('qText').textContent = q.q;

  var box = document.getElementById('ansBox');
  box.innerHTML = '';
  for (var k = 0; k < OPTS.length; k++) {
    (function(idx) {
      var btn = document.createElement('button');
      btn.className = 'abtn' + (answers[currentQ] === idx ? ' sel' : '');
      btn.innerHTML = '<span class="lt">' + OPTS[idx].lt + '</span><span>' + OPTS[idx].t + '</span>';
      btn.onclick = function() { selectAnswer(idx); };
      box.appendChild(btn);
    })(k);
  }

  document.getElementById('prevBtn').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').textContent = currentQ === 20 ? '✨ Результаты' : 'Далее →';
}

function selectAnswer(idx) {
  answers[currentQ] = idx;
  var btns = document.querySelectorAll('.abtn');
  for (var i = 0; i < btns.length; i++) { btns[i].classList.toggle('sel', i === idx); }
}

function nextQ() {
  if (answers[currentQ] === null) {
    var btns = document.querySelectorAll('.abtn');
    for (var i = 0; i < btns.length; i++) { btns[i].style.animation = 'shake .3s'; }
    setTimeout(function() { var b2 = document.querySelectorAll('.abtn'); for (var j = 0; j < b2.length; j++) { b2[j].style.animation = ''; } }, 300);
    return;
  }
  if (currentQ < 20) { currentQ++; renderQuestion(); window.scrollTo({top:0,behavior:'smooth'}); }
  else { calculateResults(); }
}

function prevQ() { if (currentQ > 0) { currentQ--; renderQuestion(); } }
function doExit() { if (confirm('Прервать тест? Прогресс не сохранён.')) { showScreen('welcome'); } }

function calculateResults() {
  var totalScore = 0;
  var byBeginning = {};
  var byLevel = {};
  var byBL = {};

  for (var i = 0; i < BEGINNINGS.length; i++) {
    var bid = BEGINNINGS[i].id;
    byBeginning[bid] = {score:0, percent:0};
    byBL[bid] = {};
    for (var j = 0; j < LEVELS.length; j++) {
      var lid = LEVELS[j].id;
      byBL[bid][lid] = {score:0, percent:0};
    }
  }
  for (var j2 = 0; j2 < LEVELS.length; j2++) { byLevel[LEVELS[j2].id] = {score:0, percent:0}; }

  for (var k = 0; k < QS.length; k++) {
    var val = OPTS[answers[k]].v;
    totalScore += val;
    byBeginning[QS[k].b].score += val;
    byLevel[QS[k].l].score += val;
    byBL[QS[k].b][QS[k].l].score += val;
  }

  for (var bi = 0; bi < BEGINNINGS.length; bi++) {
    var bid2 = BEGINNINGS[bi].id;
    byBeginning[bid2].percent = Math.round(byBeginning[bid2].score / 3000 * 100);
    for (var li = 0; li < LEVELS.length; li++) {
      byBL[bid2][LEVELS[li].id].percent = Math.round(byBL[bid2][LEVELS[li].id].score / 1000 * 100);
    }
  }
  for (var li2 = 0; li2 < LEVELS.length; li2++) {
    byLevel[LEVELS[li2].id].percent = Math.round(byLevel[LEVELS[li2].id].score / 7000 * 100);
  }

  var overallPct = Math.round(totalScore / 21000 * 100);

  var result = {
    date: new Date().toISOString(),
    byBeginning: byBeginning,
    byLevel: byLevel,
    byBL: byBL,
    overall: overallPct,
    totalScore: totalScore
  };

  saveResult(result);
  displayResults(result);
}

  if (lRange > 40) {
    insHtml += '<div class="ins-item"><div class="il" style="color:#fbbf24">⚠️ Дисбаланс уровней глубины</div><div class="ix">';
    insHtml += 'Между <span style="color:' + lvs[0].cl + '">Телом</span>, <span style="color:' + lvs[1].cl + '">Душой</span> и <span style="color:' + lvs[2].cl + '">Духом</span> наблюдается разброс ' + lRange + '%. ';
    var lSorted = lvs.slice().sort(function(a,b){return b.percent - a.percent;});
    insHtml += 'Сильнее всего развит ' + lSorted[0].ic + ' ' + lSorted[0].n + ' (' + lSorted[0].percent + '%), слабее — ' + lSorted[2].ic + ' ' + lSorted[2].n + ' (' + lSorted[2].percent + '%). ';
    insHtml += 'Это значит, что любовь проявляется неравномерно: в одной глубине вы чувствуете себя уверенно, а в другой — теряетесь. Практикуйте интеграцию: если сильнее Тело — добавляйте рефлексию (Душа) и поиск смыслов (Дух). Если сильнее Дух — заземляйтесь через тело.';
    insHtml += '</div></div>';
  }

  // Beginning imbalances
  var bRange = sorted[0].percent - sorted[sorted.length-1].percent;
  if (bRange > 50) {
    insHtml += '<div class="ins-item"><div class="il" style="color:#fbbf24">⚠️ Перекос между началами</div><div class="ix">';
    insHtml += 'Разница между самым сильным (' + sorted[0].name + ', ' + sorted[0].percent + '%) и самым слабым (' + sorted[sorted.length-1].name + ', ' + sorted[sorted.length-1].percent + '%) началом составляет ' + bRange + '%. ';
    insHtml += 'Такой перекос может создавать напряжение: например, мощная страсть (ЭРОС) при слабой самодостаточности (АВТАРКИЯ) ведёт к зависимости. Или сильная забота (АГАПЭ) при слабой структуре (ПРАГМА) — к выгоранию. Баланс — не значит одинаковость, а значит осознанность.';
    insHtml += '</div></div>';
  }

  // Detailed per-beginning analysis
  insHtml += '<h4 style="margin-top:14px">📖 Подробно по каждому началу</h4>';

  for (var di = 0; di < BEGINNINGS.length; di++) {
    var db = BEGINNINGS[di];
    var dp = r.byBeginning[db.id].percent;
    var status = dp > 60 ? 'ON' : (dp < -60 ? 'OFF' : 'в развитии');
    var desc = dp > 60 ? db.desc_hi : (dp > -60 ? db.desc_mid : db.desc_lo);

    insHtml += '<div class="ins-item">';
    insHtml += '<div class="il">' + db.ic + ' ' + db.n + ' (' + db.gr + '): <span style="color:' + (dp > 60 ? '#4ade80' : (dp < -60 ? '#f87171' : '#fbbf24')) + '">' + (dp >= 0 ? '+' : '') + dp + '% (' + status + ')</span></div>';
    insHtml += '<div class="ix">' + desc;

    // Level details for this beginning
    insHtml += '<br><br>';
    for (var dli = 0; dli < LEVELS.length; dli++) {
      var dlv = LEVELS[dli];
      var dlvP = r.byBL[db.id][dlv.id].percent;
      var lvDesc = dlvP > 60 ? dlv.desc_hi : (dlvP > -60 ? dlv.desc_mid : dlv.desc_lo);
      insHtml += '<br><b style="color:' + dlv.cl + '">' + dlv.ic + ' ' + dlv.n + ' (' + (dlvP >= 0 ? '+' : '') + dlvP + '%)</b>: ' + lvDesc;
    }
    insHtml += '</div></div>';
  }

  // Recommendations
  insHtml += '<h4 style="margin-top:14px">🧭 Персональные рекомендации</h4>';
  var recs = [];

  // Per-beginning recommendations
  for (var ri2 = 0; ri2 < BEGINNINGS.length; ri2++) {
    var rb = BEGINNINGS[ri2];
    var rp = r.byBeginning[rb.id].percent;
    if (rp < -60) {
      recs.push({ic:rb.ic, t:'Приоритет: ' + rb.name + ' (' + rb.gr + ') — OFF', x:rb.desc_lo + ' Начните с ежедневной 5-минутной практики, связанной с этим началом. Через месяц переоткройте тест для отслеживания динамики.'});
    } else if (rp < 0) {
      recs.push({ic:rb.ic, t:'Развивайте ' + rb.name + ' (' + rb.gr + ')', x:rb.desc_lo});
    } else if (rp < 30) {
      recs.push({ic:rb.ic, t:'Усильте ' + rb.name + ' (' + rb.gr + ')', x:rb.desc_mid});
    }
  }

  // Per-level recommendations
  for (var rli = 0; rli < LEVELS.length; rli++) {
    var rlv = LEVELS[rli];
    var rlp = r.byLevel[rlv.id].percent;
    if (rlp < -60) {
      recs.push({ic:rlv.ic, t:'Критически: ' + rlv.n, x:rlv.desc_lo});
    } else if (rlp < 0) {
      recs.push({ic:rlv.ic, t:'Внимание: ' + rlv.n, x:rlv.desc_lo});
    }
  }

  // Combo recommendations
  if (r.byBeginning.eros.percent > 70 && r.byBeginning.autarkia.percent < 30) {
    recs.push({ic:'⚖️', t:'Баланс ἔρως / αὐτάρκεια', x:'Мощная страсть при низкой самодостаточности — классический рецепт зависимости. Практикуйте: «Я выбираю быть с другим, а не нуждаться в другом». 30 минут одиночества в день — не наказание, а инвестиция.'});
  }
  if (r.byBeginning.agape.percent > 70 && r.byBeginning.autarkia.percent < 0) {
    recs.push({ic:'💧', t:'Баланс ἀγάπη / αὐτάρκεια', x:'Безусловная забота при низкой самодостаточности ведёт к выгоранию. Помните: вы не можете налить из пустого сосуда. Наполняйте себя, прежде чем отдавать другим.'});
  }
  if (r.byBeginning.ludus.percent < -60 && r.byBeginning.pragma.percent > 50) {
    recs.push({ic:'🎭', t:'Структура без игры', x:'ПРАГМА развита, но ЛЮДУС подавлен. Ваши отношения могут стать «бизнес-проектом». Добавьте лёгкости: спонтанные свидания, шутки, неожиданные жесты.'});
  }

  if (recs.length === 0) {
    recs.push({ic:'🌟', t:'Продолжайте расти', x:'Ваш профиль сбалансирован и ресурсен. Поддерживайте текущие практики, оставайтесь открытыми к новому опыту и не забывайте делиться своей любовью с миром.'});
  }

  for (var rci = 0; rci < recs.length; rci++) {
    var rec = recs[rci];
    insHtml += '<div class="ins-item"><div class="il">' + rec.ic + ' ' + rec.t + '</div><div class="ix">' + rec.x + '</div></div>';
  }

  document.getElementById('insBox').innerHTML = insHtml;
  window._lastResult = r;
}

function saveResult(r) {
  var h = JSON.parse(localStorage.getItem('sem_history') || '[]');
  h.unshift(r);
  if (h.length > 30) h = h.slice(0, 30);
  localStorage.setItem('sem_history', JSON.stringify(h));
}

function renderHistoryList() {
  var h = JSON.parse(localStorage.getItem('sem_history') || '[]');
  var el = document.getElementById('hList');
  if (h.length === 0) { el.innerHTML = '<div class="no-h">🌿 Пока нет прохождений.<br>Пройдите тест.</div>'; return; }
  el.innerHTML = '';
  for (var i = 0; i < h.length; i++) {
    (function(idx) {
      var r = h[idx];
      var d = new Date(r.date);
      var p = r.overall;
      var c = p > 60 ? '#4ade80' : (p > -60 ? '#fbbf24' : '#f87171');
      var div = document.createElement('div');
      div.className = 'h-item';
      div.innerHTML = '<div><div class="hd">' + d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}) + '</div><div class="hs" style="color:' + c + '">' + (p >= 0 ? '+' : '') + p + '%</div></div><div class="ha"><button onclick="viewH(' + idx + ')">👁️</button><button onclick="delH(' + idx + ')">🗑️</button></div>';
      el.appendChild(div);
    })(i);
  }
}

function viewH(idx) { var h = JSON.parse(localStorage.getItem('sem_history')||'[]'); if(h[idx]) displayResults(h[idx]); }
function delH(idx) { if(!confirm('Удалить?')) return; var h = JSON.parse(localStorage.getItem('sem_history')||'[]'); h.splice(idx,1); localStorage.setItem('sem_history',JSON.stringify(h)); renderHistoryList(); }

function exportPDF() {
  var r = window._lastResult;
  if (!r) return;
  var d = new Date(r.date);
  var p = r.overall;
  var st = p > 60 ? 'РЕСУРС' : (p > 20 ? 'РАЗВИТИЕ' : (p > -20 ? 'НЕЙТРАЛЬ' : (p > -60 ? 'РИСК' : 'КРИЗИС')));
  var rows = '';
  for (var i = 0; i < BEGINNINGS.length; i++) {
    var b = BEGINNINGS[i];
    var v = r.byBeginning[b.id];
    var ind = v.percent > 60 ? 'ON' : (v.percent < -60 ? 'OFF' : '—');
    rows += '<tr><td style="padding:6px;border:1px solid #ddd">' + b.ic + ' ' + b.n + ' (' + b.gr + ')</td><td style="padding:6px;border:1px solid #ddd;text-align:center;color:' + (v.percent > 60 ? '#22c55e' : (v.percent < -60 ? '#ef4444' : '#666')) + '">' + (v.percent >= 0 ? '+' : '') + v.percent + '%</td><td style="padding:6px;border:1px solid #ddd;text-align:center">' + ind + '</td></tr>';
  }
  var div = document.createElement('div');
  div.style.cssText = 'position:absolute;left:-9999px;top:0;width:600px;background:#fff;color:#1a1a2e;font-family:Inter,sans-serif;padding:30px;';
  div.innerHTML = '<h1 style="font-size:22px;margin-bottom:4px">🌿 Семетриум Любви — Отчёт</h1><p style="color:#666;font-size:13px;margin-bottom:20px">' + d.toLocaleDateString('ru-RU') + '</p><div style="text-align:center;margin:24px 0"><div style="font-size:48px;font-weight:700;color:' + (p >= 0 ? '#22c55e' : '#ef4444') + '">' + (p >= 0 ? '+' : '') + p + '%</div><div style="font-size:16px;color:#666">Индекс Любви: ' + st + '</div></div><h2 style="font-size:16px;margin:20px 0 8px;border-bottom:2px solid #e94560;padding-bottom:4px">7 Начал</h2><table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="background:#f5f5f5"><th style="padding:8px;border:1px solid #ddd;text-align:left">Начало</th><th style="padding:8px;border:1px solid #ddd">%</th><th style="padding:8px;border:1px solid #ddd">Инд.</th></tr>' + rows + '</table><p style="margin-top:32px;font-size:11px;color:#999;text-align:center">triraid.ru/love • Семетриум Любви</p>';
  document.body.appendChild(div);
  var w = window.open('','','width=600,height=800');
  w.document.write('<html><head><title>Отчёт</title></head><body>' + div.innerHTML + '</body></html>');
  w.document.close(); w.focus();
  setTimeout(function(){w.print();},500);
  setTimeout(function(){document.body.removeChild(div);},1000);
}

// Init
document.getElementById('nextBtn').onclick = nextQ;
document.getElementById('prevBtn').onclick = prevQ;

// Draw welcome logo
document.getElementById('logoSvg').innerHTML = buildSemSvg([0,0,0,0,0,0,0], 100);
</script>
