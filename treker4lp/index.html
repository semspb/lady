<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenOffOn — State Tracker</title>

<style>
:root {
    --bg: #ffffff;
    --text: #111;
    --accent: #6C5CE7;
    --card: #f5f6fa;
    --green: #00b894;
    --red: #d63031;
}

[data-theme="dark"] {
    --bg: #0f0f12;
    --text: #fff;
    --card: #1a1a22;
}

body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 40px 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-weight: 700;
    font-size: 20px;
}

.controls {
    display: flex;
    gap: 10px;
}

button {
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
}

.hero {
    margin-top: 60px;
    text-align: center;
}

.hero h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.hero p {
    opacity: 0.7;
}

.dashboard {
    margin-top: 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 16px;
}

.energy {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

.circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: bold;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 0.7; }
}

.slider {
    width: 100%;
}

.result {
    font-size: 28px;
    text-align: center;
    margin-top: 10px;
}

.positive { color: var(--green); }
.negative { color: var(--red); }

.footer {
    text-align: center;
    margin-top: 40px;
    opacity: 0.6;
}
</style>
</head>

<body data-theme="light">

<div class="container">

    <div class="header">
        <div class="logo">GenOffOn</div>
        <div class="controls">
            <button onclick="toggleTheme()">🌗</button>
            <button onclick="toggleLang()">RU / EN</button>
        </div>
    </div>

    <div class="hero">
        <h1 id="title">Трекер состояния</h1>
        <p id="subtitle">Твой день. Твоё состояние. Твой результат.</p>
    </div>

    <div class="dashboard">

        <div class="card">
            <h3 id="energyTitle">Энергии</h3>
            <div class="energy">
                <div class="circle" id="e1">50</div>
                <div class="circle" id="e2">50</div>
                <div class="circle" id="e3">50</div>
            </div>
        </div>

        <div class="card">
            <h3 id="controlTitle">Управление</h3>

            <label>Energy 1</label>
            <input type="range" min="0" max="100" value="50" class="slider" oninput="update()">

            <label>Energy 2</label>
            <input type="range" min="0" max="100" value="50" class="slider" oninput="update()">

            <label>Energy 3</label>
            <input type="range" min="0" max="100" value="50" class="slider" oninput="update()">
        </div>

    </div>

    <div class="card" style="margin-top:20px;">
        <h3 id="resultTitle">Результат дня</h3>
        <div class="result" id="result">0</div>
    </div>

    <div class="footer">
        GenOffOn © 2026
    </div>

</div>

<script>

let lang = "ru";

function update() {
    let sliders = document.querySelectorAll('.slider');
    let values = [...sliders].map(s => parseInt(s.value));

    document.getElementById('e1').innerText = values[0];
    document.getElementById('e2').innerText = values[1];
    document.getElementById('e3').innerText = values[2];

    let result = values.reduce((a,b)=>a+b,0) / 3;
    let el = document.getElementById('result');
    el.innerText = Math.round(result);

    el.className = "result " + (result >= 60 ? "positive" : "negative");
}

function toggleTheme() {
    let body = document.body;
    body.dataset.theme = body.dataset.theme === "dark" ? "light" : "dark";
}

function toggleLang() {
    lang = lang === "ru" ? "en" : "ru";

    const dict = {
        ru: {
            title: "Трекер состояния",
            subtitle: "Твой день. Твоё состояние. Твой результат.",
            energy: "Энергии",
            control: "Управление",
            result: "Результат дня"
        },
        en: {
            title: "State Tracker",
            subtitle: "Your day. Your state. Your result.",
            energy: "Energies",
            control: "Controls",
            result: "Daily Result"
        }
    };

    document.getElementById('title').innerText = dict[lang].title;
    document.getElementById('subtitle').innerText = dict[lang].subtitle;
    document.getElementById('energyTitle').innerText = dict[lang].energy;
    document.getElementById('controlTitle').innerText = dict[lang].control;
    document.getElementById('resultTitle').innerText = dict[lang].result;
}

update();

</script>

</body>
</html>
