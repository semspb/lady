<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GenOffOn — Управление состоянием</title>

<meta name="description" content="Управляй своим состоянием за 10 минут в день. GenOffOn — система перехода из хаоса в контроль.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0b0b12;
  --card:#151521;
  --text:#ffffff;
  --muted:#a0a0b0;
  --primary:#7c5cff;
}

[data-theme="light"] {
  --bg:#f5f5ff;
  --card:#ffffff;
  --text:#1a1a2e;
  --muted:#666;
  --primary:#6c4cff;
}

body {
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

header {
  display:flex;
  justify-content:space-between;
  margin-bottom:40px;
}

button {
  cursor:pointer;
  border:none;
  padding:10px 16px;
  border-radius:8px;
}

.btn-main {
  background:var(--primary);
  color:#fff;
}

.hero {
  text-align:center;
  padding:80px 0;
}

.hero h1 {
  font-size:42px;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:16px;
}

.demo {
  text-align:center;
  margin:60px 0;
}

.states button {
  margin:10px;
  font-size:20px;
}

.result {
  margin-top:20px;
  font-size:18px;
  color:var(--primary);
}

footer {
  text-align:center;
  margin-top:60px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<header>
  <div><b>GenOffOn</b></div>
  <div>
    <button id="langBtn">EN</button>
    <button id="themeBtn">🌗</button>
  </div>
</header>

<section class="hero">
  <h1 data-i18n="h1"></h1>
  <p data-i18n="sub"></p>

  <button class="btn-main" data-i18n="cta"></button>
</section>

<section class="cards">
  <div class="card">
    <h3 data-i18n="c1t"></h3>
    <p data-i18n="c1d"></p>
  </div>
  <div class="card">
    <h3 data-i18n="c2t"></h3>
    <p data-i18n="c2d"></p>
  </div>
  <div class="card">
    <h3 data-i18n="c3t"></h3>
    <p data-i18n="c3d"></p>
  </div>
</section>

<section class="demo">
  <h2 data-i18n="demoTitle"></h2>
  <p data-i18n="demoQ"></p>

  <div class="states">
    <button onclick="selectState('bad')">🔴</button>
    <button onclick="selectState('ok')">🟡</button>
    <button onclick="selectState('good')">🟢</button>
  </div>

  <div class="result" id="result"></div>
</section>

<footer data-i18n="footer"></footer>

</div>

<script>
const i18n = {
ru:{
h1:"Управляй своим состоянием",
sub:"10 минут в день → контроль, ясность, энергия",
cta:"Включить себя",
c1t:"Утро — ON",
c1d:"Задаёшь состояние",
c2t:"День — SYNC",
c2d:"Возвращаешь фокус",
c3t:"Вечер — RESET",
c3d:"Закрываешь день",
demoTitle:"Попробуй сейчас",
demoQ:"Как ты себя чувствуешь?",
footer:"© GenOffOn"
},
en:{
h1:"Control your state",
sub:"10 min a day → clarity, control, energy",
cta:"Turn ON",
c1t:"Morning — ON",
c1d:"Set your state",
c2t:"Day — SYNC",
c2d:"Regain focus",
c3t:"Evening — RESET",
c3d:"Close the day",
demoTitle:"Try now",
demoQ:"How do you feel?",
footer:"© GenOffOn"
}
};

let lang="ru";

function setLang(l){
  lang=l;
  document.getElementById("langBtn").innerText=l==="ru"?"EN":"RU";
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.innerText=i18n[l][el.dataset.i18n];
  });
}

setLang("ru");

document.getElementById("langBtn").onclick=()=>{
  setLang(lang==="ru"?"en":"ru");
};

document.getElementById("themeBtn").onclick=()=>{
  const html=document.documentElement;
  html.dataset.theme=html.dataset.theme==="dark"?"light":"dark";
};

function selectState(s){
  const r=document.getElementById("result");
  if(s==="bad") r.innerText="→ Reset (2 мин)";
  if(s==="ok") r.innerText="→ Focus (2 мин)";
  if(s==="good") r.innerText="→ Continue";
}
</script>

</body>
</html>
