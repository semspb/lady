<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="800" height="1200">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; user-select: none; }
      .level-text { font-size: 14px; font-weight: bold; fill: white; }
    </style>
  </defs>

  <!-- Фон -->
  <rect width="800" height="1200" fill="#f8f9fa" rx="10"/>

  <!-- Заголовок -->
  <text x="400" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">Карта сознания Дэвида Хокинса</text>
  <text x="400" y="65" text-anchor="middle" font-size="14" fill="#7f8c8d">16 уровней энергии — от Стыда к Просветлению</text>

  <!-- Уровни снизу вверх (от y=1100 до y=80) -->

  <!-- 1. Стыд (20) - самый маленький, снизу -->
  <rect x="355" y="1100" width="90" height="36" rx="18" fill="#1a1a1a" opacity="0.85"/>
  <text x="400" y="1123" text-anchor="middle" class="level-text">Стыд</text>

  <!-- 2. Вина (30) -->
  <rect x="340" y="1060" width="120" height="38" rx="19" fill="#2c2c2c" opacity="0.85"/>
  <text x="400" y="1083" text-anchor="middle" class="level-text">Вина</text>

  <!-- 3. Апатия (50) -->
  <rect x="325" y="1020" width="150" height="38" rx="19" fill="#4a4a4a" opacity="0.85"/>
  <text x="400" y="1043" text-anchor="middle" class="level-text">Апатия</text>

  <!-- 4. Горе (75) -->
  <rect x="310" y="980" width="180" height="38" rx="19" fill="#6b4c7a" opacity="0.85"/>
  <text x="400" y="1003" text-anchor="middle" class="level-text">Горе</text>

  <!-- 5. Страх (100) -->
  <rect x="295" y="940" width="210" height="38" rx="19" fill="#7a6c4c" opacity="0.85"/>
  <text x="400" y="963" text-anchor="middle" class="level-text">Страх</text>

  <!-- 6. Желание (125) -->
  <rect x="280" y="900" width="240" height="38" rx="19" fill="#8b5e3c" opacity="0.85"/>
  <text x="400" y="923" text-anchor="middle" class="level-text">Желание</text>

  <!-- 7. Гнев (150) -->
  <rect x="265" y="860" width="270" height="38" rx="19" fill="#b22222" opacity="0.85"/>
  <text x="400" y="883" text-anchor="middle" class="level-text">Гнев</text>

  <!-- 8. Гордость (175) -->
  <rect x="250" y="820" width="300" height="38" rx="19" fill="#c97e3a" opacity="0.85"/>
  <text x="400" y="843" text-anchor="middle" class="level-text">Гордость</text>

  <!-- Горизонтальная линия-разделитель 200 -->
  <line x1="50" y1="812" x2="750" y2="812" stroke="#f39c12" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- 9. Мужество (200) -->
  <rect x="235" y="775" width="330" height="42" rx="21" fill="#4a90a4" opacity="0.85"/>
  <text x="400" y="799" text-anchor="middle" class="level-text">Мужество</text>

  <!-- 10. Нейтралитет (250) -->
  <rect x="220" y="730" width="360" height="42" rx="21" fill="#5ba87a" opacity="0.85"/>
  <text x="400" y="754" text-anchor="middle" class="level-text">Нейтралитет</text>

  <!-- 11. Готовность (310) -->
  <rect x="205" y="685" width="390" height="42" rx="21" fill="#7cb342" opacity="0.85"/>
  <text x="400" y="709" text-anchor="middle" class="level-text">Готовность</text>

  <!-- 12. Принятие (350) -->
  <rect x="190" y="640" width="420" height="42" rx="21" fill="#8bc34a" opacity="0.85"/>
  <text x="400" y="664" text-anchor="middle" class="level-text">Принятие</text>

  <!-- 13. Разум (400) -->
  <rect x="175" y="595" width="450" height="42" rx="21" fill="#5c6bc0" opacity="0.85"/>
  <text x="400" y="619" text-anchor="middle" class="level-text">Разум</text>

  <!-- 14. Любовь (500) - розовый цвет -->
  <rect x="155" y="545" width="490" height="46" rx="23" fill="#e91e63" opacity="0.85"/>
  <text x="400" y="571" text-anchor="middle" class="level-text" font-size="15">Любовь</text>

  <!-- 15. Радость (540) -->
  <rect x="140" y="490" width="520" height="50" rx="25" fill="#ff9800" opacity="0.85"/>
  <text x="400" y="517" text-anchor="middle" class="level-text" font-size="15">Радость</text>

  <!-- 16. Мир (600) -->
  <rect x="120" y="430" width="560" height="54" rx="27" fill="#3f51b5" opacity="0.85"/>
  <text x="400" y="460" text-anchor="middle" class="level-text" font-size="16">Мир</text>

  <!-- 17. Просветление (700-1000) - самый большой, наверху -->
  <rect x="90" y="360" width="620" height="64" rx="32" fill="#9c27b0" opacity="0.9"/>
  <text x="400" y="393" text-anchor="middle" class="level-text" font-size="18">Просветление</text>

  <!-- Легенда снизу -->
  <rect x="100" y="1150" width="12" height="12" rx="3" fill="#1a1a1a"/>
  <text x="118" y="1161" font-size="11" fill="#555">&lt; 200 (Выживание)</text>

  <rect x="240" y="1150" width="12" height="12" rx="3" fill="#4a90a4"/>
  <text x="258" y="1161" font-size="11" fill="#555">200–499 (Сила духа)</text>

  <rect x="400" y="1150" width="12" height="12" rx="3" fill="#e91e63"/>
  <text x="418" y="1161" font-size="11" fill="#555">500–1000 (Духовность)</text>

  <!-- Стрелка роста -->
  <line x1="770" y1="1120" x2="770" y2="380" stroke="#999" stroke-width="1.5"/>
  <defs>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M0,8 L4,0 L8,8" fill="#999"/>
    </marker>
  </defs>
  <text x="780" y="750" writing-mode="tb" font-size="11" fill="#999">Рост энергии</text>

</svg>
