<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; user-select: none; }
      .level-text { font-size: 14px; font-weight: bold; fill: white; }
      .title-text { font-size: 24px; font-weight: bold; fill: #2c3e50; }
      .subtitle-text { font-size: 14px; fill: #7f8c8d; }
    </style>
  </defs>

  <!-- Фон -->
  <rect width="800" height="1100" fill="#f8f9fa" rx="10"/>

  <!-- Заголовок -->
  <text x="400" y="40" text-anchor="middle" class="title-text">Шкала энергетического состояния</text>
  <text x="400" y="65" text-anchor="middle" class="subtitle-text">16 уровней сознания — от Стыда к Просветлению</text>

  <!-- ==================== ЗОНА 1: ВЫЖИВАНИЕ (уровни 1-8) — СНИЗУ, САМЫЕ МАЛЕНЬКИЕ ==================== -->
  <rect x="30" y="860" width="740" height="210" rx="12" fill="#ffebee" opacity="0.5"/>
  <text x="50" y="882" font-size="13" font-weight="bold" fill="#c62828">⬇ ЗОНА ВЫЖИВАНИЯ — уровни ниже 200</text>

  <!-- 1. Стыд — самый маленький, снизу -->
  <rect x="355" y="920" width="90" height="36" rx="18" fill="#1a1a1a" opacity="0.85"/>
  <text x="400" y="943" text-anchor="middle" class="level-text">Стыд</text>

  <!-- 2. Вина — чуть шире -->
  <rect x="340" y="878" width="120" height="38" rx="19" fill="#2c2c2c" opacity="0.85"/>
  <text x="400" y="901" text-anchor="middle" class="level-text">Вина</text>

  <!-- 3. Апатия -->
  <rect x="325" y="836" width="150" height="38" rx="19" fill="#4a4a4a" opacity="0.85"/>
  <text x="400" y="859" text-anchor="middle" class="level-text">Апатия</text>

  <!-- 4. Горе -->
  <rect x="310" y="794" width="180" height="38" rx="19" fill="#6b4c7a" opacity="0.85"/>
  <text x="400" y="817" text-anchor="middle" class="level-text">Горе</text>

  <!-- 5. Страх -->
  <rect x="295" y="752" width="210" height="38" rx="19" fill="#7a6c4c" opacity="0.85"/>
  <text x="400" y="775" text-anchor="middle" class="level-text">Страх</text>

  <!-- 6. Желание -->
  <rect x="280" y="710" width="240" height="38" rx="19" fill="#8b5e3c" opacity="0.85"/>
  <text x="400" y="733" text-anchor="middle" class="level-text">Желание</text>

  <!-- 7. Гнев -->
  <rect x="265" y="668" width="270" height="38" rx="19" fill="#b22222" opacity="0.85"/>
  <text x="400" y="691" text-anchor="middle" class="level-text">Гнев</text>

  <!-- 8. Гордость -->
  <rect x="250" y="626" width="300" height="38" rx="19" fill="#c97e3a" opacity="0.85"/>
  <text x="400" y="649" text-anchor="middle" class="level-text">Гордость</text>

  <!-- Разделительная линия между зонами -->
  <line x1="40" y1="618" x2="760" y2="618" stroke="#f39c12" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="400" y="610" text-anchor="middle" font-size="12" fill="#f39c12" font-weight="bold">▲ ПОРОГ 200 — переход от насилия к силе ▲</text>

  <!-- ==================== ЗОНА 2: СИЛА ДУХА (уровни 9-13) ==================== -->
  <rect x="30" y="350" width="740" height="250" rx="12" fill="#e8f5e9" opacity="0.5"/>
  <text x="50" y="372" font-size="13" font-weight="bold" fill="#2e7d32">⬆ ЗОНА СИЛЫ ДУХА — уровни 200–499 (Линейный ум)</text>

  <!-- 9. Мужество -->
  <rect x="235" y="390" width="330" height="42" rx="21" fill="#4a90a4" opacity="0.85"/>
  <text x="400" y="414" text-anchor="middle" class="level-text">Мужество</text>

  <!-- 10. Нейтралитет -->
  <rect x="220" y="438" width="360" height="42" rx="21" fill="#5ba87a" opacity="0.85"/>
  <text x="400" y="462" text-anchor="middle" class="level-text">Нейтралитет</text>

  <!-- 11. Готовность -->
  <rect x="205" y="486" width="390" height="42" rx="21" fill="#7cb342" opacity="0.85"/>
  <text x="400" y="510" text-anchor="middle" class="level-text">Готовность</text>

  <!-- 12. Принятие -->
  <rect x="190" y="534" width="420" height="42" rx="21" fill="#8bc34a" opacity="0.85"/>
  <text x="400" y="558" text-anchor="middle" class="level-text">Принятие</text>

  <!-- 13. Разум -->
  <rect x="175" y="582" width="450" height="42" rx="21" fill="#5c6bc0" opacity="0.85"/>
  <text x="400" y="606" text-anchor="middle" class="level-text">Разум</text>

  <!-- Разделительная линия между зонами -->
  <line x1="40" y1="342" x2="760" y2="342" stroke="#9c27b0" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="400" y="334" text-anchor="middle" font-size="12" fill="#9c27b0" font-weight="bold">▲ ПОРОГ 500 — переход от ума к сердцу ▲</text>

  <!-- ==================== ЗОНА 3: ДУХОВНОСТЬ (уровни 14-17) — СВЕРХУ, САМЫЕ БОЛЬШИЕ ==================== -->
  <rect x="30" y="88" width="740" height="240" rx="12" fill="#f3e5f5" opacity="0.5"/>
  <text x="50" y="110" font-size="13" font-weight="bold" fill="#6a1b9a">⬆ ЗОНА ДУХОВНОСТИ — уровни 500–1000 (Духовная реальность)</text>

  <!-- 14. Любовь (розовый) -->
  <rect x="155" y="125" width="490" height="46" rx="23" fill="#e91e63" opacity="0.85"/>
  <text x="400" y="151" text-anchor="middle" class="level-text" font-size="15">Любовь</text>

  <!-- 15. Радость -->
  <rect x="140" y="178" width="520" height="50" rx="25" fill="#ff9800" opacity="0.85"/>
  <text x="400" y="205" text-anchor="middle" class="level-text" font-size="15">Радость</text>

  <!-- 16. Мир -->
  <rect x="120" y="235" width="560" height="54" rx="27" fill="#3f51b5" opacity="0.85"/>
  <text x="400" y="265" text-anchor="middle" class="level-text" font-size="16">Мир</text>

  <!-- 17. Просветление (самый большой, наверху) -->
  <rect x="90" y="296" width="620" height="64" rx="32" fill="#9c27b0" opacity="0.9"/>
  <text x="400" y="330" text-anchor="middle" class="level-text" font-size="18">Просветление</text>

  <!-- Стрелка роста справа (снизу вверх) -->
  <line x1="770" y1="940" x2="770" y2="150" stroke="#999" stroke-width="2"/>
  <polygon points="770,145 765,155 775,155" fill="#999"/>
  <text x="785" y="550" writing-mode="tb" font-size="12" fill="#999" font-weight="bold">РОСТ ЭНЕРГИИ →</text>

</svg>
